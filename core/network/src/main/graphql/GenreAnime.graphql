query GenreAnime($genre: String, $page: Int = 1, $perPage: Int = 20) {
  Page(page: $page, perPage: $perPage) {
    media(
      genre: $genre
      type: ANIME
      sort: POPULARITY_DESC
      isAdult: false
    ) {
      ...AnimeFragment
    }
    pageInfo {
      total
      currentPage
      lastPage
      hasNextPage
    }
  }
}
